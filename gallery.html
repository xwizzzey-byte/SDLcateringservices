<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | SDL Catering Worcester</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f8f8f8;
    margin:0;
    padding:40px;
}

.back-link{
    display:inline-block;
    margin-bottom:30px;
    color:#b8860b;
    text-decoration:none;
    font-weight:bold;
}

h1{
    text-align:center;
    color:#b8860b;
    margin-bottom:10px;
}

.intro{
    text-align:center;
    color:#666;
    max-width:700px;
    margin:0 auto 40px auto;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.gallery img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    transition:0.3s ease;
}

.gallery img:hover{
    transform:scale(1.03);
}

@media(max-width:768px){
    body{
        padding:20px;
    }

    .gallery img{
        height:280px;
    }
}
</style>

</head>
