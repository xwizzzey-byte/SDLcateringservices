<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDL Catering | Luxury Event Catering</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --black:#0d0d0d;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,sans-serif;
  color:#fff;
}

header{
  position:fixed;
  top:0;
  width:100%;
  z-index:999;
  background:rgba(0,0,0,.88);
}

nav{
  max-width:1400px;
  margin:auto;
  padding:22px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:30px;
}

.logo{
  font-family:"Cormorant Garamond",serif;
  font-size:2rem;
  font-weight:700;
  color:var(--gold);
}

.nav-links{
  display:flex;
  gap:32px;
  align-items:center;
  list-style:none;
}

.nav-links a,
.nav-links a:link,
.nav-links a:visited{
  color:white !important;
  text-decoration:none !important;
  font-weight:500;
}

.nav-links a:hover,
.nav-links a.active{
  color:var(--gold) !important;
}

.hero{
  min-height:100vh;
  background:
  linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
  url("https://images.unsplash.com/photo-1414235077428-338989a2e8c0");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:120px 20px 60px;
}

.hero-content{
  max-width:900px;
}

.hero h1{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(3rem,8vw,6rem);
  line-height:1;
  margin-bottom:25px;
}

.hero p{
  font-size:1.3rem;
  margin-bottom:35px;
}

.btn{
  display:inline-block;
  background:var(--gold);
  color:#000 !important;
  text-decoration:none !important;
  padding:16px 42px;
  border-radius:40px;
  font-weight:700;
}

@media(max-width:800px){
  nav{
    flex-direction:column;
    gap:18px;
  }

  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
    gap:18px;
  }

  .hero h1{
    font-size:3rem;
  }
}
</style>
</head>

<body>

<header>
  <nav>
    <div class="logo">SDL Catering</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="packages.html">Packages</a></li>
      <li><a href="reviews.html">Reviews</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Luxury Catering For Extraordinary Events</h1>
    <p>Exceptional cuisine, flawless presentation and unforgettable experiences.</p>
    <a class="btn" href="contact.html">Request A Quote</a>
  </div>
</section>

</body>
</html>
